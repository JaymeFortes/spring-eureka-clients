<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Console de Catalogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Space Grotesk", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "monospace"]
          },
          colors: {
            ink: "#091018",
            shell: "#0f1b2a",
            panel: "#13263c",
            accent: "#ff9f1c",
            mint: "#2ec4b6"
          },
          keyframes: {
            drift: {
              "0%,100%": { transform: "translate(0px, 0px) scale(1)" },
              "50%": { transform: "translate(14px, -12px) scale(1.08)" }
            },
            rise: {
              "0%": { opacity: "0", transform: "translateY(14px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            }
          },
          animation: {
            drift: "drift 7s ease-in-out infinite",
            rise: "rise 650ms ease both"
          }
        }
      }
    };
  </script>
  <style>
    ::selection {
      background: rgba(255, 159, 28, 0.35);
    }
  </style>
</head>
<body class="min-h-screen bg-ink text-slate-100 antialiased">
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute -top-24 -left-20 h-72 w-72 rounded-full bg-accent/25 blur-3xl animate-drift"></div>
    <div class="absolute top-1/3 -right-20 h-72 w-72 rounded-full bg-mint/25 blur-3xl animate-drift [animation-delay:1.8s]"></div>
  </div>
  <div id="root" class="relative z-10"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="/app.js"></script>
</body>
</html>
