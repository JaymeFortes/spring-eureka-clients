server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: "*"
                allowed-methods: "*"
                allowed-headers: "*"
          routes:
            - id: pecas
              uri: ${PECAS_SERVICE_URL:lb://PECAS-SERVICE}
              predicates:
                - Path=/api/pecas/**
            - id: clientes
              uri: ${CLIENTES_SERVICE_URL:lb://CLIENTES-SERVICE}
              predicates:
                - Path=/api/clientes/**
            - id: representantes
              uri: ${REPRESENTANTES_SERVICE_URL:lb://REPRESENTANTES-SERVICE}
              predicates:
                - Path=/api/representantes/**
